<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>AIBA Cloud</title>
    <script>
      // Apply the persisted theme before first paint to avoid a light flash.
      // Mirrors web/src/shared/store/theme.ts (zustand-persist key "aiba.theme").
      (function () {
        try {
          var raw = localStorage.getItem("aiba.theme");
          var theme = raw ? (JSON.parse(raw).state || {}).theme : "system";
          var dark =
            theme === "dark" ||
            ((!theme || theme === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app-mobile/main.tsx"></script>
  </body>
</html>
