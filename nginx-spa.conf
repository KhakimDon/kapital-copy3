server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Backend lives at backend:18001 inside the compose network. The edge nginx
  # at 10.0.0.5 terminates TLS for next.aiba.uz and proxies to this container
  # on the host; we serve the SPA + forward /api to the Rust backend over the
  # docker network. Local dev uses Vite's proxy (see vite.config.ts) so this
  # config is production-only.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $backend http://backend:18001;

  # MCP clients (Claude Desktop/web) probe OAuth discovery BEFORE connecting.
  # The SPA fallback used to answer 200 index.html for these, which made the
  # client believe this server runs OAuth and bounce the user into a doomed
  # claude.ai start-auth flow instead of just connecting with the token URL.
  # We run NO OAuth — these must be hard 404s.
  location ~ ^/\.well-known/(oauth-authorization-server|oauth-protected-resource|openid-configuration)(/|$) {
    return 404;
  }
  location ~ ^/(authorize|token|register)$ {
    return 404;
  }

  # Two shells, one app: phones get the mobile entry (m.html, bottom-nav
  # shell), everything else the desktop entry. A persistent aiba_view cookie
  # overrides the sniff in both directions ("Desktop versiya" / "Mobil
  # versiya" toggles set it).
  set $spa /index.html;
  if ($http_user_agent ~* "(android|iphone|ipod|windows phone|mobile)") {
    set $spa /m.html;
  }
  if ($cookie_aiba_view = "desktop") {
    set $spa /index.html;
  }
  if ($cookie_aiba_view = "mobile") {
    set $spa /m.html;
  }

  # Legacy redirect: the old route scheme prefixed every page with `/m/`
  # (e.g. /m/wiki). That prefix was removed — the app now lives at the bare
  # path (/wiki, /tasks). 302 old bookmarks/links to the new URL, query intact.
  # `^~` beats the SPA `location /`; `/m.html` (the mobile entry file, no
  # trailing slash) is NOT matched by `^/m/`.
  location ^~ /m/ {
    rewrite ^/m/(.*)$ /$1 redirect;
  }

  # SPA fallback: serve the picked entry for anything that isn't a real file.
  # NOTE: no `$uri/` here. On `/` it matches the docroot as a directory, and
  # nginx then serves the `index` (index.html) via an internal redirect — so
  # `$spa` never gets a look and phones landing on the bare domain got the
  # DESKTOP shell. An SPA has no directories to index; `$uri` (real assets)
  # then `$spa` (the sniffed entry) is all we need.
  location / {
    try_files $uri $spa;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location = /m.html {
    add_header Cache-Control "no-cache";
  }

  # API → Rust backend. Includes long-poll / SSE friendly timeouts.
  location /api/ {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # E-IMZO signing WebSocket relay: extension → backend → host daemon (:64646).
  # `/service/cryptapi` and `/ws/service/cryptapi` are the two paths the axum
  # handler accepts; both need Upgrade + Connection for the WS handshake.
  location /service/ {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /ws/ {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location = /health {
    proxy_pass $backend/health;
  }
}
